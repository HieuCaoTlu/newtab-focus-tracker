<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<script src="theme-init.js"></script>
<link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
<link rel="stylesheet" href="newtab.css">
<script type="module" src="vendor/emoji-picker/index.js"></script>
<script src="i18n.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 data-i18n="tasksTitle">Tasks</h1>
      <div class="header-actions">
        <button id="focus-toggle" class="text-btn" data-i18n-title="focusTitle" title="Focus">
          <i id="focus-toggle-icon" class="fa-solid fa-crosshairs"></i>
          <span id="focus-toggle-label" data-i18n="focusBtn">Focus</span>
        </button>
        <button id="history-toggle" class="icon-btn" data-i18n-title="historyToggleTitle" title="Completed history">
          <i class="fa-solid fa-clock-rotate-left"></i>
        </button>
        <div class="settings-wrapper">
          <button id="settings-toggle" class="icon-btn" data-i18n-title="settingsTitle" title="Settings">
            <i class="fa-solid fa-gear"></i>
          </button>
          <div id="settings-menu" class="settings-menu hidden">
            <div id="language-group" class="language-group">
              <button type="button" id="language-en" class="language-pill" data-lang="en">EN</button>
              <button type="button" id="language-vi" class="language-pill" data-lang="vi">VI</button>
            </div>
            <div id="theme-group" class="language-group">
              <button type="button" id="theme-light" class="language-pill" data-theme="light">
                <i class="fa-solid fa-sun"></i> <span data-i18n="themeLight">Light</span>
              </button>
              <button type="button" id="theme-dark" class="language-pill" data-theme="dark">
                <i class="fa-solid fa-moon"></i> <span data-i18n="themeDark">Dark</span>
              </button>
            </div>
            <button id="export-btn" class="settings-item">
              <i class="fa-solid fa-file-export"></i>
              <span data-i18n="exportBtn">Export data</span>
            </button>
            <button id="import-btn" class="settings-item">
              <i class="fa-solid fa-file-import"></i>
              <span data-i18n="importBtn">Import data</span>
            </button>
            <input type="file" id="import-file" accept="application/json" class="hidden">
          </div>
        </div>
      </div>
    </div>

    <form id="task-form">
      <div class="form-row">
        <button type="button" id="emoji-trigger" class="emoji-trigger">🔥</button>
        <input type="text" id="title" data-i18n-placeholder="taskTitlePlaceholder" placeholder="Task name" required>
        <input type="date" id="deadline" required>
        <button type="submit" id="submit-btn" data-i18n="addBtn">Add</button>
        <button type="button" id="complete-btn" class="hidden" data-i18n-title="completeTitle" title="Complete">
          <i class="fa-solid fa-check"></i>
        </button>
        <button type="button" id="delete-btn" class="hidden" data-i18n-title="deleteTitle" title="Delete">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
      <input type="hidden" id="edit-id">
      <input type="hidden" id="emoji" value="🔥">

      <div id="emoji-picker-popup" class="emoji-popup hidden">
        <emoji-picker data-source="vendor/emoji-picker/emoji-data.json"></emoji-picker>
      </div>
    </form>

    <ul id="task-list"></ul>
    <div id="task-dots" class="dots"></div>

    <div class="section-header">
      <h1 data-i18n="habitsTitle">Habits</h1>
      <button id="habit-create-btn" class="icon-btn" data-i18n-title="createHabitTitle" title="Create new habit">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>

    <div id="habit-list" class="habit-list"></div>
    <div id="habit-dots" class="dots dots-horizontal"></div>
  </div>

  <div id="habit-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <form id="habit-form">
        <div class="form-row">
          <button type="button" id="habit-detail-back" class="icon-btn hidden" data-i18n-title="backTitle" title="Back">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button type="button" id="habit-emoji-trigger" class="emoji-trigger">🔥</button>
          <input type="text" id="habit-title" data-i18n-placeholder="habitTitlePlaceholder" placeholder="Habit name" required>
          <button type="submit" id="habit-submit-btn" data-i18n="addBtn">Add</button>
          <button type="button" id="habit-delete-btn" class="hidden" data-i18n-title="deleteTitle" title="Delete">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
        <input type="hidden" id="habit-emoji" value="🔥">
        <input type="hidden" id="habit-edit-id">

        <div id="habit-days" class="habit-days">
          <label class="habit-day-pill" data-all><input type="checkbox"> <span data-i18n="dayAll">All</span></label>
          <label class="habit-day-pill"><input type="checkbox" value="1"> <span data-i18n="dayMon">Mon</span></label>
          <label class="habit-day-pill"><input type="checkbox" value="2"> <span data-i18n="dayTue">Tue</span></label>
          <label class="habit-day-pill"><input type="checkbox" value="3"> <span data-i18n="dayWed">Wed</span></label>
          <label class="habit-day-pill"><input type="checkbox" value="4"> <span data-i18n="dayThu">Thu</span></label>
          <label class="habit-day-pill"><input type="checkbox" value="5"> <span data-i18n="dayFri">Fri</span></label>
          <label class="habit-day-pill"><input type="checkbox" value="6"> <span data-i18n="daySat">Sat</span></label>
          <label class="habit-day-pill"><input type="checkbox" value="0"> <span data-i18n="daySun">Sun</span></label>
        </div>

        <div id="habit-emoji-picker-popup" class="emoji-popup hidden">
          <emoji-picker data-source="vendor/emoji-picker/emoji-data.json"></emoji-picker>
        </div>
      </form>

      <ul id="habit-modal-list"></ul>

      <div id="habit-detail" class="habit-detail hidden">
        <div class="habit-detail-add-row">
          <input type="date" id="habit-detail-add-date" />
          <button type="button" id="habit-detail-add-btn" class="icon-btn" data-i18n-title="addDayTitle" title="Add day"><i class="fa-solid fa-plus"></i></button>
        </div>
        <ul id="habit-detail-list"></ul>
      </div>
    </div>
  </div>

  <div id="history-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h1 data-i18n="completedTitle">Completed</h1>
      </div>
      <ul id="history-list"></ul>
    </div>
  </div>

  <div id="focus-modal-overlay" class="modal-overlay hidden">
    <div class="modal focus-modal">
      <div class="modal-header">
        <h1 data-i18n="focusTitle">Focus</h1>
      </div>
      <form id="focus-form">
        <label class="focus-label" for="focus-domains" data-i18n="focusDomainsLabel">Domains to block (one per line)</label>
        <textarea id="focus-domains" placeholder="facebook.com&#10;youtube.com&#10;tiktok.com" rows="5" required></textarea>

        <label class="focus-label" data-i18n="focusDurationLabel">Focus duration</label>
        <div id="focus-duration-pills" class="focus-duration-pills">
          <button type="button" class="focus-duration-pill" data-minutes="25" data-i18n="duration25">25 min</button>
          <button type="button" class="focus-duration-pill" data-minutes="45" data-i18n="duration45">45 min</button>
          <button type="button" class="focus-duration-pill" data-minutes="60" data-i18n="duration60">1 hour</button>
          <button type="button" class="focus-duration-pill" data-minutes="120" data-i18n="duration120">2 hours</button>
        </div>
        <input type="number" id="focus-custom-minutes" min="1" data-i18n-placeholder="focusCustomPlaceholder" placeholder="Or enter custom minutes">

        <button type="submit" id="focus-start-btn" data-i18n="focusStartBtn">Start Focus</button>
      </form>

      <div id="focus-active-view" class="focus-active-view hidden">
        <div class="focus-active-countdown">
          <i class="fa-solid fa-hourglass-half fa-spin-pulse"></i>
          <span id="focus-active-time">--:--</span>
        </div>
        <p class="focus-active-hint" data-i18n="focusActiveHint">The following domains are blocked until time runs out:</p>
        <ul id="focus-active-domains" class="focus-active-domains"></ul>

        <form id="focus-add-domain-form" class="focus-add-domain-form">
          <input type="text" id="focus-add-domain-input" data-i18n-placeholder="focusAddDomainPlaceholder" placeholder="Add a domain, e.g. reddit.com" required>
          <button type="submit" data-i18n-title="addTitle" title="Add"><i class="fa-solid fa-plus"></i></button>
        </form>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
