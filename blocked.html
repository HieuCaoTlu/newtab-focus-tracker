<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đang tập trung</title>
<script src="theme-init.js"></script>
<link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
<style>
  * { box-sizing: border-box; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
  :root {
    --bg: #161616;
    --fg: #f0f0f0;
    --muted: #a8a8a8;
    --card-bg: #232323;
    --accent: #6c5ce7;
  }
  .light {
    --bg: #f5f6f7;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --card-bg: #ffffff;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    text-align: center;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
  }
  .icon {
    font-size: 40px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 22px;
  }
  p {
    color: var(--muted);
    margin: 0 0 20px;
  }
  #countdown {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon"><i class="fa-solid fa-lock"></i></div>
    <h1>Đang trong chế độ tập trung</h1>
    <p>Trang này đã bị chặn để bạn hoàn toàn tập trung.</p>
    <div id="countdown">--:--</div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
